version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hexagonia}
      POSTGRES_USER: ${POSTGRES_USER:-hexagonia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hexagonia}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  server:
    image: ghcr.io/${GHCR_OWNER:-woodfairy}/hexagonia-server:${IMAGE_TAG:-latest}
    pull_policy: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://hexagonia:hexagonia@postgres:5432/hexagonia}
      SESSION_COOKIE_SECRET: ${SESSION_COOKIE_SECRET:-replace-me}
      PORT: ${PORT:-3000}
    ports:
      - "3000:3000"

  web:
    image: ghcr.io/${GHCR_OWNER:-woodfairy}/hexagonia-web:${IMAGE_TAG:-latest}
    pull_policy: always
    depends_on:
      - server
    ports:
      - "4173:4173"
